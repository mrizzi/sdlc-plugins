# Path-filtered trigger for the eval dispatch workflow (eval-pr-run.yml).
# This workflow does no work itself — its completion signals eval-pr-run.yml
# to run via workflow_run.
#
# See docs/specs/2026-05-07-eval-pr-fork-dispatch-design.md for full design.

name: Eval PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'plugins/sdlc-workflow/skills/**/*.md'
      - 'evals/**/evals.json'
      - '.github/workflows/eval-pr.yml'

jobs:
  trigger:
    name: Trigger Eval Dispatch
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: echo "PR touches eval paths — dispatching eval run"
